name: RealmCore
version: 1.0.0
main: com.tristan.realmcore.RealmCorePlugin
api-version: "1.20"
author: Tristan
description: Modular Paper plugin with homes, warps, teleport, daily rewards, admin tools and GUI menus.
commands:
  realmcore:
    description: Main RealmCore command
  setspawn:
    description: Set server spawn
  spawn:
    description: Teleport to spawn
  sethome:
    description: Set a home
  home:
    description: Open homes or teleport
  setwarp:
    description: Set a warp
  warp:
    description: Open warps or teleport
  tpa:
    description: Request teleport
  tpahere:
    description: Request a player teleport to you
  tpaccept:
    description: Accept teleport request
  tpdeny:
    description: Deny teleport request
  daily:
    description: Claim daily reward
  heal:
    description: Heal yourself
  feed:
    description: Feed yourself
  fly:
    description: Toggle flight
  rtp:
    description: Random teleport
  vanish:
    description: Toggle vanish
  gm:
    description: Change gamemode
permissions:
  realmcore.spawn.set:
    default: op
  realmcore.vanish.see:
    default: op
